---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: instance
    image: "geerlingguy/docker-{{ lookup('env', 'MOLECULE_DISTRO') | default('debian12', true) }}-ansible:latest"
    pre_build_image: true
    privileged: true # To run systemd inside image
    volumes: # To run systemd inside image
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command: null # Use the default image's CMD.
provisioner:
  name: ansible
verifier:
  name: testinfra
